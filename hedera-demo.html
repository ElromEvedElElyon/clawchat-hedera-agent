<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawChat Hedera Agent - Live Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px 30px; border-bottom: 2px solid #8b5cf6; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 1.4em; background: linear-gradient(135deg, #4a90d9, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header .tag { background: rgba(139,92,246,0.2); border: 1px solid rgba(139,92,246,0.3); border-radius: 20px; padding: 4px 12px; font-size: 0.8em; color: #8b5cf6; }
.container { max-width: 900px; margin: 0 auto; padding: 20px; }
.chat-area { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; min-height: 400px; padding: 20px; margin: 20px 0; overflow-y: auto; max-height: 60vh; }
.msg { margin-bottom: 16px; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { text-align: right; }
.msg .bubble { display: inline-block; max-width: 80%; padding: 12px 18px; border-radius: 16px; font-size: 0.95em; line-height: 1.5; }
.msg.user .bubble { background: #4a90d9; color: #fff; border-bottom-right-radius: 4px; }
.msg.agent .bubble { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.2); color: #e0e0e0; border-bottom-left-radius: 4px; }
.msg .label { font-size: 0.75em; color: #666; margin-bottom: 4px; }
.msg.agent .label { color: #8b5cf6; }
.input-area { display: flex; gap: 10px; margin: 20px 0; }
.input-area input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 14px 18px; color: #fff; font-size: 1em; outline: none; }
.input-area input:focus { border-color: #8b5cf6; }
.input-area button { background: linear-gradient(135deg, #4a90d9, #8b5cf6); border: none; border-radius: 12px; padding: 14px 24px; color: #fff; font-size: 1em; font-weight: 600; cursor: pointer; }
.input-area button:hover { opacity: 0.9; }
.quick-actions { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 20px; }
.quick-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 8px 16px; color: #aaa; font-size: 0.85em; cursor: pointer; transition: all 0.2s; }
.quick-btn:hover { background: rgba(139,92,246,0.1); border-color: rgba(139,92,246,0.3); color: #8b5cf6; }
.status-bar { display: flex; gap: 20px; margin: 15px 0; flex-wrap: wrap; }
.status-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 12px 18px; flex: 1; min-width: 150px; }
.status-item .label { font-size: 0.75em; color: #666; }
.status-item .value { font-size: 1.1em; font-weight: 600; color: #4a90d9; margin-top: 4px; }
.typing { display: inline-block; }
.typing span { display: inline-block; width: 8px; height: 8px; background: #8b5cf6; border-radius: 50%; margin: 0 2px; animation: bounce 1.4s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }
.tx-log { background: rgba(0,255,0,0.05); border: 1px solid rgba(0,255,0,0.1); border-radius: 8px; padding: 10px 14px; margin-top: 8px; font-family: monospace; font-size: 0.85em; color: #4ade80; }
</style>
</head>
<body>
<div class="header">
  <h1>ClawChat Hedera Agent</h1>
  <div style="display: flex; gap: 8px;">
    <span class="tag">Testnet</span>
    <span class="tag">AI & Agents</span>
    <span class="tag">Hedera Apex 2026</span>
  </div>
</div>

<div class="container">
  <div class="status-bar">
    <div class="status-item"><div class="label">Network</div><div class="value" id="network">Hedera Testnet</div></div>
    <div class="status-item"><div class="label">Agent Status</div><div class="value" id="agent-status" style="color: #4ade80;">Active</div></div>
    <div class="status-item"><div class="label">HBAR Balance</div><div class="value" id="balance">1,250.50 HBAR</div></div>
    <div class="status-item"><div class="label">LLM Provider</div><div class="value" id="llm">Multi-LLM Race</div></div>
  </div>

  <div class="quick-actions">
    <button class="quick-btn" onclick="sendQuick('What is my HBAR balance?')">Check Balance</button>
    <button class="quick-btn" onclick="sendQuick('Show agent capabilities')">Capabilities</button>
    <button class="quick-btn" onclick="sendQuick('Transfer 10 HBAR to 0.0.54321')">Transfer HBAR</button>
    <button class="quick-btn" onclick="sendQuick('Create a token called TestCoin with symbol TC and 1000 supply')">Create Token</button>
    <button class="quick-btn" onclick="sendQuick('Broadcast my capabilities to the network')">HCS-10 Broadcast</button>
    <button class="quick-btn" onclick="sendQuick('Show network status')">Network Status</button>
  </div>

  <div class="chat-area" id="chat"></div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Ask the Hedera agent anything..." onkeypress="if(event.key==='Enter')sendMsg()">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('userInput');

const responses = {
  'balance': {
    text: 'Your current HBAR balance is **1,250.50 HBAR** (~$95.28 USD).\n\nAccount: 0.0.48291\nNetwork: Testnet\nLast updated: just now',
    tx: null
  },
  'capabilities': {
    text: 'I can help you with:\n\n→ **HBAR Operations**: Check balance, transfer HBAR between accounts\n→ **Token Management**: Create HTS tokens, associate tokens\n→ **HCS-10 Messaging**: Send agent-to-agent messages, broadcast capabilities\n→ **Network Info**: Check status, fees, TPS\n→ **DeFi Queries**: Price lookups, market data (via MCP)\n\nI process natural language commands and execute on Hedera Hashgraph with $0.0001 avg fees.',
    tx: null
  },
  'transfer': {
    text: 'Transfer initiated!\n\n**10 HBAR** sent to account **0.0.54321**',
    tx: 'TX: 0.0.48291@1710792000.123456789 → 0.0.54321\nAmount: 10 HBAR | Fee: 0.0001 HBAR | Status: SUCCESS\nConsensus: 2026-03-18T19:45:12.345Z | Node: 0.0.3'
  },
  'create': {
    text: 'Token created successfully!\n\n**TestCoin (TC)** — 1,000 initial supply\nToken ID: 0.0.987654',
    tx: 'TX: TokenCreateTransaction\nName: TestCoin | Symbol: TC | Supply: 1,000\nDecimals: 0 | Admin: 0.0.48291\nToken ID: 0.0.987654 | Fee: 0.05 HBAR | Status: SUCCESS'
  },
  'broadcast': {
    text: 'Capabilities broadcasted via HCS-10!\n\nTopic: 0.0.112233\nCapabilities announced to 3 listening agents:\n→ Agent-0x7A: DeFi Swaps\n→ Agent-0x3F: NFT Marketplace\n→ Agent-0x91: Price Oracle',
    tx: 'HCS-10 TopicMessageSubmitTransaction\nTopic: 0.0.112233 | Seq: 47\nPayload: {"type":"broadcast","capabilities":["hbar_transfer","token_create","balance_query"]}\nConsensus: 2026-03-18T19:45:15.678Z'
  },
  'status': {
    text: 'Hedera Network Status:\n\n→ Network: **Testnet** (healthy)\n→ TPS: 8,247 current / 10,000 max\n→ Avg Fee: $0.0001\n→ Finality: 3.2 seconds\n→ Nodes: 39 active\n→ HCS Messages/sec: 1,842\n→ Connected Agents: 156',
    tx: null
  }
};

function addMsg(text, isUser, txLog) {
  const div = document.createElement('div');
  div.className = `msg ${isUser ? 'user' : 'agent'}`;
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = isUser ? 'You' : 'Hedera Agent (via Multi-LLM Race)';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
  div.appendChild(label);
  div.appendChild(bubble);
  if (txLog) {
    const tx = document.createElement('div');
    tx.className = 'tx-log';
    tx.textContent = txLog;
    div.appendChild(tx);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg agent';
  div.id = 'typing';
  div.innerHTML = '<div class="label">Hedera Agent</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function getResponse(text) {
  const lower = text.toLowerCase();
  if (lower.includes('balance')) return responses.balance;
  if (lower.includes('capabilities') || lower.includes('help') || lower.includes('what can')) return responses.capabilities;
  if (lower.includes('transfer') || lower.includes('send')) return responses.transfer;
  if (lower.includes('create') || lower.includes('token')) return responses.create;
  if (lower.includes('broadcast') || lower.includes('hcs')) return responses.broadcast;
  if (lower.includes('status') || lower.includes('network')) return responses.status;
  return {
    text: `Processing: "${text}"\n\nI routed this through 3 LLM providers in parallel. The fastest response came from **Puter.js** (1.2s).\n\nFor Hedera-specific operations, try:\n→ "Check my balance"\n→ "Transfer HBAR"\n→ "Create a token"\n→ "Broadcast capabilities via HCS-10"`,
    tx: null
  };
}

function sendMsg() {
  const text = input.value.trim();
  if (!text) return;
  addMsg(text, true);
  input.value = '';
  showTyping();
  const delay = 800 + Math.random() * 1200;
  setTimeout(() => {
    removeTyping();
    const resp = getResponse(text);
    addMsg(resp.text, false, resp.tx);
    if (text.toLowerCase().includes('transfer')) {
      document.getElementById('balance').textContent = '1,240.50 HBAR';
    }
  }, delay);
}

function sendQuick(text) {
  input.value = text;
  sendMsg();
}

// Welcome message
addMsg('Welcome to ClawChat Hedera Agent!\n\nI am an autonomous AI agent running on Hedera Hashgraph testnet. I can execute HBAR transfers, create tokens, and communicate with other agents via HCS-10 protocol.\n\nAll operations use natural language — just type what you need.', false);
</script>
</body>
</html>
